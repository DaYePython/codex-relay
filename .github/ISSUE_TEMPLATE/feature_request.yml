name: Feature request
description: Suggest an improvement for Codex Relay.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please write feature requests in English by default. If English is difficult, start with a short English summary and then add details in your preferred language.
  - type: checkboxes
    id: language
    attributes:
      label: Language
      options:
        - label: I wrote this request in English, or included a concise English summary first.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what makes it hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like Codex Relay to change or add?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or different design you tried.
